spring.application.name=doc
# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/docdb
spring.datasource.username=docuser
spring.datasource.password=docpassword
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT (replace with a long random string)
app.jwt.secret=your-very-long-secret-key-at-least-256-bits-long
app.jwt.expiration=86400000